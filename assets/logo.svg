<svg viewBox="0 0 480 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Drummers and Dreamers Magazine Logo">
  <defs>
    <!-- Drum Red gradient for glitch effect -->
    <linearGradient id="rg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E63946"/>
      <stop offset="100%" stop-color="#C62D39"/>
    </linearGradient>
    <!-- Cyan accent gradient -->
    <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00B4D8"/>
      <stop offset="100%" stop-color="#0090B0"/>
    </linearGradient>
    <!-- Clip for drum circle icon -->
    <clipPath id="drum-clip">
      <circle cx="56" cy="80" r="48"/>
    </clipPath>
  </defs>

  <!-- ── DRUM ICON (left) ── -->
  <!-- Outer drum rim -->
  <circle cx="56" cy="80" r="48" fill="none" stroke="#E63946" stroke-width="3.5"/>
  <!-- Inner drum head -->
  <ellipse cx="56" cy="80" rx="36" ry="10" fill="none" stroke="#E63946" stroke-width="1.5" opacity="0.6"/>
  <!-- Drum shell sides -->
  <line x1="8" y1="80" x2="8" y2="104" stroke="#E63946" stroke-width="2"/>
  <line x1="104" y1="80" x2="104" y2="104" stroke="#E63946" stroke-width="2"/>
  <!-- Bottom rim -->
  <ellipse cx="56" cy="104" rx="48" ry="10" fill="none" stroke="#E63946" stroke-width="2" opacity="0.5"/>
  <!-- Tension rods (subtle) -->
  <line x1="14" y1="72" x2="14" y2="112" stroke="#E63946" stroke-width="1" opacity="0.3"/>
  <line x1="98" y1="72" x2="98" y2="112" stroke="#E63946" stroke-width="1" opacity="0.3"/>
  <line x1="32" y1="33" x2="32" y2="42" stroke="#E63946" stroke-width="1" opacity="0.3"/>
  <line x1="80" y1="33" x2="80" y2="42" stroke="#E63946" stroke-width="1" opacity="0.3"/>
  <!-- Drumsticks (angled, crossing) -->
  <line x1="38" y1="28" x2="70" y2="74" stroke="#E0E0EC" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <line x1="74" y1="28" x2="42" y2="74" stroke="#E0E0EC" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <!-- Stick tips (dots) -->
  <circle cx="38" cy="28" r="3.5" fill="#00B4D8"/>
  <circle cx="74" cy="28" r="3.5" fill="#00B4D8"/>
  <!-- Cyan accent ring (glitch layer) -->
  <circle cx="56" cy="80" r="48" fill="none" stroke="#00B4D8" stroke-width="1" stroke-dasharray="8 140 8 0" opacity="0.5"/>

  <!-- ── WORDMARK ── -->
  <!-- "DRUMMERS" -->
  <text x="126" y="72"
        font-family="'Rajdhani', 'Impact', sans-serif"
        font-size="42"
        font-weight="700"
        letter-spacing="3"
        fill="#FFFFFF"
        text-anchor="start">DRUMMERS</text>

  <!-- Glitch offset layers for "DRUMMERS" -->
  <text x="128" y="72"
        font-family="'Rajdhani', 'Impact', sans-serif"
        font-size="42"
        font-weight="700"
        letter-spacing="3"
        fill="#E63946"
        text-anchor="start"
        opacity="0.18">DRUMMERS</text>

  <!-- "&" ampersand — the signature mark -->
  <text x="126" y="118"
        font-family="'Playfair Display', Georgia, serif"
        font-size="22"
        font-weight="700"
        font-style="italic"
        fill="#E63946"
        text-anchor="start">&amp;</text>

  <!-- "DREAMERS" -->
  <text x="152" y="118"
        font-family="'Rajdhani', 'Impact', sans-serif"
        font-size="42"
        font-weight="700"
        letter-spacing="3"
        fill="#FFFFFF"
        text-anchor="start">DREAMERS</text>

  <!-- Cyan underline on DREAMERS (the signature element) -->
  <line x1="152" y1="124" x2="452" y2="124" stroke="#00B4D8" stroke-width="2"/>

  <!-- Horizontal rule between the two words -->
  <line x1="126" y1="84" x2="454" y2="84" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- "MAGAZINE" byline -->
  <text x="454" y="72"
        font-family="'Space Mono', monospace, sans-serif"
        font-size="9"
        font-weight="400"
        letter-spacing="4"
        fill="#787892"
        text-anchor="end">MAGAZINE</text>

  <!-- Issue dot and year -->
  <circle cx="458" cy="115" r="2" fill="#E63946"/>
  <text x="464" y="119"
        font-family="'Space Mono', monospace, sans-serif"
        font-size="8"
        font-weight="400"
        letter-spacing="2"
        fill="#787892"
        text-anchor="start">2026</text>
</svg>
